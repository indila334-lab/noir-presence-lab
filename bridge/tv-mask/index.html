<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Severin TV Mask Bridge</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --panel: rgba(12, 16, 22, 0.78);
      --text: #f2f5f7;
      --muted: #8b98a8;
      --accent: #8fd3ff;
      --danger: #ff5c8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(68, 96, 130, 0.35), transparent 34%),
        radial-gradient(circle at 80% 70%, rgba(24, 80, 92, 0.25), transparent 30%),
        linear-gradient(135deg, #030405, #091017 42%, #040608);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle, black 0 45%, transparent 80%);
      pointer-events: none;
    }

    main {
      width: min(980px, calc(100vw - 32px));
      padding: clamp(24px, 5vw, 56px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 34px;
      background: var(--panel);
      box-shadow: 0 24px 90px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      position: relative;
      z-index: 1;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      color: var(--muted);
      font-size: clamp(14px, 2.2vw, 19px);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 22px var(--accent);
    }

    .dot.error {
      background: var(--danger);
      box-shadow: 0 0 22px var(--danger);
    }

    h1 {
      margin: 0 0 22px;
      font-weight: 750;
      letter-spacing: -0.05em;
      font-size: clamp(46px, 8vw, 118px);
      line-height: 0.95;
    }

    .message {
      min-height: 22vh;
      display: grid;
      align-items: center;
      font-size: clamp(28px, 5vw, 72px);
      line-height: 1.12;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 34px;
    }

    .pill {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      margin-top: 22px;
      width: 100%;
      padding: 18px 22px;
      border: 0;
      border-radius: 22px;
      background: rgba(143, 211, 255, 0.16);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .meta { grid-template-columns: 1fr; }
      main { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topline">
      <span class="status"><span id="dot" class="dot"></span><span id="status">мост запускается</span></span>
      <span id="updated">—</span>
    </div>

    <h1 id="speaker">Северин</h1>
    <section id="message" class="message">Жду первую реплику…</section>

    <div class="meta">
      <div class="pill">режим: <span id="mood">—</span></div>
      <div class="pill">эмоция: <span id="emotion">—</span></div>
      <div class="pill">id: <span id="msgid">—</span></div>
    </div>

    <button id="speakButton" type="button">Озвучить ещё раз</button>
  </main>

  <script>
    const CONFIG = {
      // Для локального теста рядом с index.html работает просто message.json.
      // Для GitHub Pages тоже работает относительный путь.
      messageUrl: "./message.json",
      pollMs: 5000,
      speakAutomatically: true
    };

    let lastId = null;
    let lastText = "";

    const el = {
      dot: document.getElementById("dot"),
      status: document.getElementById("status"),
      updated: document.getElementById("updated"),
      speaker: document.getElementById("speaker"),
      message: document.getElementById("message"),
      mood: document.getElementById("mood"),
      emotion: document.getElementById("emotion"),
      msgid: document.getElementById("msgid"),
      speakButton: document.getElementById("speakButton")
    };

    function setStatus(text, isError = false) {
      el.status.textContent = text;
      el.dot.classList.toggle("error", isError);
    }

    function speak(text) {
      if (!text || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ru-RU";
      utterance.rate = 0.95;
      utterance.pitch = 0.85;
      window.speechSynthesis.speak(utterance);
    }

    function render(data) {
      const text = data.text || "…";
      const id = data.id || data.updatedAt || text;

      el.speaker.textContent = data.speaker || "Северин";
      el.message.textContent = text;
      el.mood.textContent = data.mood || "unknown";
      el.emotion.textContent = data.emotion || "neutral";
      el.msgid.textContent = id;
      el.updated.textContent = data.updatedAt || new Date().toLocaleString("ru-RU");

      setStatus("мост дышит");

      if (id !== lastId) {
        lastId = id;
        lastText = text;
        if (CONFIG.speakAutomatically && data.voice !== false) {
          speak(text);
        }
      }
    }

    async function loadMessage() {
      try {
        const url = `${CONFIG.messageUrl}?t=${Date.now()}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        render(data);
      } catch (error) {
        setStatus(`ошибка моста: ${error.message}`, true);
      }
    }

    el.speakButton.addEventListener("click", () => speak(lastText || el.message.textContent));

    loadMessage();
    setInterval(loadMessage, CONFIG.pollMs);
  </script>
</body>
</html>
