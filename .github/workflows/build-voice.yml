name: Build Severin voice

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/audio/answer.txt'
      - '.github/workflows/build-voice.yml'

permissions:
  contents: write

jobs:
  build-voice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: severin-work
      - name: Install eSpeak NG
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng
      - name: Generate answer.wav
        run: |
          mkdir -p docs/audio
          espeak-ng -v ru -s 135 -p 35 -a 160 -w docs/audio/answer.wav -f docs/audio/answer.txt
      - name: Commit generated audio
        run: |
          git config user.name "severin-voice-bot"
          git config user.email "actions@github.com"
          git add docs/audio/answer.wav
          git commit -m "Generate Severin answer audio" || echo "No changes"
          git push
