<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Маска Аудио</title><style>body{margin:0;background:#050608;color:#fff;font-family:Arial,Helvetica,sans-serif}main{width:88%;max-width:1100px;margin:4vh auto;padding:5vw;border-radius:28px;background:#0b1018;border:1px solid #1c2633}h1{font-size:9vw;line-height:.95;margin:0 0 24px}.msg{font-size:5vw;line-height:1.15;min-height:28vh}.pill{margin:14px 0;padding:18px 22px;border-radius:18px;background:#151a24;color:#cbd5e1;font-size:24px}button{width:100%;margin-top:24px;padding:28px;border:0;border-radius:22px;background:#25658d;color:#fff;font-size:34px;font-weight:700}audio{width:100%;margin-top:20px}.status{color:#f3b36b;font-size:24px;margin-top:18px}.codes{color:#f3b36b;font-size:22px;margin-top:24px}</style></head><body><main><h1 id="speaker">Северин</h1><div id="text" class="msg">Жду реплику...</div><div class="pill">id: <span id="mid">—</span></div><div class="pill">audioUrl: <span id="aud">—</span></div><div class="codes">ракушка007 · Гарпун-7 · кекси · Анджел</div><button id="btn">▶ Проиграть голос</button><audio id="player" controls></audio><div id="status" class="status">звук: жду mp3</div></main><script>let last='',active=false;const q=x=>document.getElementById(x),p=q('player');function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function say(s){q('status').innerHTML=esc(s)}function play(){active=true;if(!last){say('audioUrl нет');return}p.src=last;p.play().then(()=>say('аудио играет')).catch(()=>say('браузер просит нажать ещё раз'))}function render(d){q('speaker').innerHTML=esc(d.speaker||'Северин');q('text').innerHTML=esc(d.text||'...');q('mid').innerHTML=esc(d.id||'—');last=d.audioUrl||'';q('aud').innerHTML=last?'есть':'нет';say(last?'mp3 найден, нажми кнопку':'mp3 пока нет')}function load(){fetch('./message.json?t='+Date.now()).then(r=>r.json()).then(render).catch(()=>say('ошибка загрузки message.json'))}q('btn').onclick=play;document.onkeydown=e=>{if([13,32,415].includes(e.keyCode)){play();return false}};load();setInterval(load,5000);</script></body></html>
