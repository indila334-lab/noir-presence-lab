<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Маска Аудио · Северин</title><style>html,body{margin:0;min-height:100%;background:#071521;color:#eef7ff;font-family:Arial,system-ui,sans-serif}body{display:grid;place-items:center;padding:22px}.box{width:min(980px,100%);background:#10273a;border:1px solid #2f607e;border-radius:26px;padding:26px;box-shadow:0 30px 100px #0008}.top{font-size:18px;color:#9cc6de;text-align:center}h1{font-size:clamp(42px,8vw,96px);line-height:.95;margin:0 0 16px}p{font-size:clamp(18px,3vw,30px);line-height:1.35;color:#d9efff}button{width:100%;margin:10px 0;padding:22px 18px;border:0;border-radius:20px;background:#1cc7f5;color:#fff;font-size:clamp(22px,4vw,42px);font-weight:800}button.dark{background:#244b68}audio{width:100%;margin:16px 0;background:#fff;border-radius:30px}pre{white-space:pre-wrap;min-height:170px;max-height:300px;overflow:auto;background:#071521;color:#ffd36b;border:1px solid #2f607e;border-radius:16px;padding:16px;font-size:22px}</style></head><body><main class="box"><p class="top">Маска Аудио · id: audio-voice-007</p><h1>Северин</h1><p>Цель: мы слышим друг друга. Мой голос идёт готовым аудиофайлом на ТВ/колонку/Алису. Твой голос должен зайти через микрофон этой системы, без телефона.</p><button id="unlock">1 · Разбудить звук</button><button id="wav">2 · Проверить мой голос-файл</button><button id="mp3">3 · Проверить docs/audio/dino.mp3</button><button id="mic">4 · Проверить микрофон 3 сек</button><button id="all" class="dark">Проверить всё</button><audio id="player" controls preload="auto"></audio><pre id="log">Готово. Сначала проверь звук, потом микрофон.</pre></main><script>const logEl=document.getElementById('log'),player=document.getElementById('player');let ctx=null;function log(m,k=''){const t=new Date().toLocaleTimeString('ru-RU');logEl.textContent='['+t+'] '+(k==='ok'?'✅ ':k==='bad'?'⚠️ ':'')+m+'\n'+logEl.textContent}function ac(){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;if(!ctx)ctx=new C();return ctx}function wav(mode='voice'){const sr=22050,sec=mode==='beep'?.22:2.1,n=Math.floor(sr*sec),data=new Int16Array(n);for(let i=0;i<n;i++){const t=i/sr,e=Math.min(1,t*10)*Math.min(1,(sec-t)*6),b=mode==='beep'?880:130,s=Math.sin(2*Math.PI*b*t)+.35*Math.sin(2*Math.PI*(b*1.5)*t);data[i]=Math.max(-1,Math.min(1,s*e*.45))*32767}const buf=new ArrayBuffer(44+n*2),v=new DataView(buf);function S(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}S(0,'RIFF');v.setUint32(4,36+n*2,true);S(8,'WAVE');S(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);S(36,'data');v.setUint32(40,n*2,true);let o=44;for(let i=0;i<n;i++,o+=2)v.setInt16(o,data[i],true);return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}))}async function play(src,msg){player.src=src;player.currentTime=0;await player.play();log(msg,'ok')}async function unlock(){const c=ac();if(c&&c.state==='suspended')await c.resume();try{await play(wav('beep'),'Звук разбужен. Выход живой.')}catch(e){log('Звук не стартовал: '+e.message,'bad')}}async function testMp3(){try{await play('./audio/dino.mp3?c='+Date.now(),'MP3 файл найден и играет.')}catch(e){log('MP3 не играет: файла docs/audio/dino.mp3 пока нет или формат не открылся.','bad')}}async function testMic(){if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){log('В этом браузере нет доступа к микрофону. Нужен микрофон, видимый Android/браузеру: пульт, USB, Bluetooth или встроенный.','bad');return}try{log('Запрашиваю микрофон. Разреши доступ, если появится окно.');const stream=await navigator.mediaDevices.getUserMedia({audio:true});const rec=new MediaRecorder(stream),chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};rec.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(chunks,{type:rec.mimeType||'audio/webm'});try{await play(URL.createObjectURL(blob),'Микрофон записал и воспроизвёл 3 секунды. Вход живой.')}catch(e){log('Запись сделана, но не проигралась: '+e.message,'bad')}};rec.start();log('Говори 3 секунды.');setTimeout(()=>rec.stop(),3000)}catch(e){log('Микрофон не получен: '+e.message,'bad')}}document.getElementById('unlock').onclick=unlock;document.getElementById('wav').onclick=()=>play(wav('voice'),'Готовый WAV играет. Это мой голосовой канал.').catch(e=>log('WAV ошибка: '+e.message,'bad'));document.getElementById('mp3').onclick=testMp3;document.getElementById('mic').onclick=testMic;document.getElementById('all').onclick=async()=>{await unlock();setTimeout(()=>document.getElementById('wav').click(),900);setTimeout(testMp3,3600)};log('TTS нет. Работаем: готовый звук наружу, микрофон внутрь.','ok');log('MediaDevices: '+(navigator.mediaDevices?'есть':'нет'));log('AudioContext: '+(ac()?'есть':'нет'));</script></body></html>
