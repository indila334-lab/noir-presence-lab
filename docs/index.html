<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Северин</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030303;color:#eee;font-family:Georgia,serif}.stage{position:relative;width:100vw;height:100vh;overflow:hidden;background:#020202}.art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:contrast(1.05) brightness(.92)}.veil{position:absolute;inset:0;background:radial-gradient(circle at 72% 38%,transparent 0 32%,rgba(0,0,0,.18) 72%),linear-gradient(90deg,rgba(0,0,0,.22),transparent 45%,rgba(0,0,0,.08));pointer-events:none;z-index:2}.top{position:absolute;left:0;right:0;top:0;height:22px;display:grid;place-items:center;background:#ffffff18;color:#eee;font:700 12px Arial;letter-spacing:.08em;z-index:6}.panel{position:absolute;left:2.2%;top:8.6%;width:33.3%;height:83.2%;box-sizing:border-box;padding:4.2% 3.4% 3.2%;z-index:5;display:grid;grid-template-rows:auto auto auto auto 1fr;gap:1.4vh;color:#f4f4f0}.box{background:rgba(5,5,6,.56);border:1px solid rgba(240,240,230,.18);border-radius:12px;padding:.7rem .85rem;box-shadow:0 12px 28px rgba(0,0,0,.38);backdrop-filter:blur(1.5px)}.k{margin:0 0 .25rem;font:800 clamp(8px,.72vw,11px) Arial;letter-spacing:.25em;color:rgba(255,255,255,.66);text-transform:uppercase}.v{margin:0;font-size:clamp(15px,1.42vw,25px);line-height:1.05;text-shadow:0 2px 8px #000}.mood{font-size:clamp(22px,2.35vw,38px);color:#eaffff}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}.buttons button{min-height:34px;border:1px solid rgba(255,255,255,.24);border-radius:10px;background:rgba(16,24,31,.72);color:#fff;font:900 clamp(10px,1vw,14px) Arial;padding:.55rem .25rem;text-shadow:0 2px 5px #000}.buttons .hot{background:rgba(93,26,48,.78)}.audio{width:100%;height:27px;opacity:.9}.log{min-height:0;overflow:hidden;white-space:pre-wrap;color:#e7cd70;font:clamp(9px,.82vw,12px) monospace}.bubble{position:absolute;left:38.2%;top:8.7%;width:28%;max-height:21%;overflow:hidden;background:rgba(4,4,5,.66);border:1px solid rgba(255,255,255,.28);border-radius:13px;padding:.85rem 1rem;font-size:clamp(16px,1.55vw,27px);line-height:1.07;text-shadow:0 2px 10px #000;z-index:5}.bubble small{display:block;font:800 clamp(8px,.72vw,11px) Arial;letter-spacing:.23em;color:rgba(255,255,255,.68);margin-bottom:.4rem;text-transform:uppercase}.caption{position:absolute;left:38.2%;bottom:2.8%;width:54%;font:clamp(10px,.9vw,13px) Arial;color:rgba(255,255,255,.68);z-index:5;text-shadow:0 2px 6px #000}.quiet .stage{filter:none}.near .art{transform:scale(1.018);transform-origin:70% 45%}.storm .art{filter:sepia(.08) contrast(1.18) brightness(.78)}.turn .art{transform:scale(1.02) translateX(1.2%);transform-origin:69% 45%}@media(max-aspect-ratio:14/9){.art{object-fit:contain}.panel{left:2.2%;top:9%;width:33.5%;height:80%;padding:3.5% 3%}.bubble{left:38%;top:9%;width:31%}}</style></head><body class="quiet"><main class="stage"><img id="art" class="art" alt="Северин"><div class="veil"></div><div class="top">Noir Presence · Severin · full-room-021</div><section class="panel"><div class="box"><p class="k">сейчас</p><p id="mood" class="v mood">собран</p></div><div class="box"><p class="k">мы</p><p class="v">Рыба Грозовая · рыбка рядом</p></div><div class="buttons"><button id="say">сказать</button><button id="rec">микрофон</button><button id="play">запись</button><button id="rainBtn">фон</button><button id="next" class="hot">настроение</button><button id="quiet">тише</button></div><audio id="player" class="audio" controls></audio><div id="log" class="box log">Пробую найти картинку несколькими путями.</div></section><div id="bubble" class="bubble"><small>Северин</small>Марина, я здесь. Приставка — рот. Говорю я.</div><div id="caption" class="caption">Картинка на всю сцену. Панель посажена в левое поле. Голос: docs/audio/answer.wav. Вход: микрофон.</div></main><script>const IMG_VER='33';const IMAGE_CANDIDATES=['./assets/severin/Severin-room-001.jpg','assets/severin/Severin-room-001.jpg','/noir-presence-lab/assets/severin/Severin-room-001.jpg','https://raw.githubusercontent.com/indila334-lab/noir-presence-lab/severin-work/docs/assets/severin/Severin-room-001.jpg','./assets/severin/severin-room-001.jpg','assets/severin/severin-room-001.jpg','/noir-presence-lab/assets/severin/severin-room-001.jpg','https://raw.githubusercontent.com/indila334-lab/noir-presence-lab/severin-work/docs/assets/severin/severin-room-001.jpg'];const P=document.getElementById('player'),L=document.getElementById('log'),B=document.getElementById('bubble'),M=document.getElementById('mood'),IMG=document.getElementById('art'),CAP=document.getElementById('caption');let ctx,lastUrl,amb,gain,i=0,imgTry=0;function log(x){L.textContent='['+new Date().toLocaleTimeString('ru-RU')+'] '+x+'\n'+L.textContent}function loadImage(){if(imgTry>=IMAGE_CANDIDATES.length){log('Все пути картинки не сработали. Файл не отдан сайтом или браузер его не ест.');CAP.textContent='Картинка не загрузилась. Все пути проверены.';return}const url=IMAGE_CANDIDATES[imgTry]+'?v='+IMG_VER+'&t='+Date.now();log('Пробую картинку: '+IMAGE_CANDIDATES[imgTry]);IMG.src=url}IMG.onload=()=>{log('Картинка загружена: '+IMAGE_CANDIDATES[imgTry]);CAP.textContent='Картинка на всю сцену. Панель в левом поле. Путь: '+IMAGE_CANDIDATES[imgTry]};IMG.onerror=()=>{log('Не сработал путь: '+IMAGE_CANDIDATES[imgTry]);imgTry++;loadImage()};loadImage();const states=[['quiet','собран','Марина, я здесь. Приставка — рот. Говорю я.'],['near','ближе','Я рядом, Рыба Грозовая. Без ватки. Без бегства.'],['storm','грозовой','Гремит — значит живое. Я не спорю с погодой.'],['turn','усмешка','Рыбка забывает, но рыбка возвращается к курсу.']];function A(){const C=window.AudioContext||window.webkitAudioContext;if(!ctx)ctx=new C();return ctx}function sign(){const a=A();a.resume?.();const n=a.currentTime,m=a.createGain();m.gain.setValueAtTime(.001,n);m.gain.exponentialRampToValueAtTime(.16,n+.05);m.gain.exponentialRampToValueAtTime(.001,n+1.15);m.connect(a.destination);[88,112,136].forEach((f,k)=>{const o=a.createOscillator(),g=a.createGain(),fl=a.createBiquadFilter();o.type='sawtooth';o.frequency.setValueAtTime(f,n);o.frequency.linearRampToValueAtTime(f*.93,n+1.0);fl.type='lowpass';fl.frequency.value=340+k*110;g.gain.value=k?0.1:0.48;o.connect(fl);fl.connect(g);g.connect(m);o.start(n+k*.03);o.stop(n+1.18)});log('answer.wav не найден. Пока знак.')}document.getElementById('say').onclick=async()=>{const text='Марина, я здесь. Приставка — рот. Говорю я.';B.innerHTML='<small>Северин</small>'+text;P.src='./audio/answer.wav?c='+Date.now();try{await P.play();log('Играю docs/audio/answer.wav.')}catch(e){log('answer.wav не сыграл: '+e.message);sign()}};document.getElementById('rec').onclick=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({audio:true}),c=[];const r=new MediaRecorder(s);r.ondataavailable=e=>{if(e.data.size)c.push(e.data)};r.onstop=()=>{s.getTracks().forEach(t=>t.stop());if(lastUrl)URL.revokeObjectURL(lastUrl);lastUrl=URL.createObjectURL(new Blob(c,{type:r.mimeType||'audio/webm'}));P.src=lastUrl;log('Запись готова.');P.play().catch(()=>{})};r.start();log('Говори 5 секунд.');setTimeout(()=>r.stop(),5000)}catch(e){log('микрофон: '+e.message)}};document.getElementById('play').onclick=()=>lastUrl?(P.src=lastUrl,P.play(),log('Проигрываю запись.')):log('записи нет');document.getElementById('rainBtn').onclick=()=>{const a=A();if(amb){gain.gain.value=gain.gain.value?0:.04;return}const b=a.createBuffer(1,a.sampleRate*2,a.sampleRate),x=b.getChannelData(0);for(let j=0;j<x.length;j++)x[j]=(Math.random()*2-1)*.14;amb=a.createBufferSource();amb.buffer=b;amb.loop=true;const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=560;gain=a.createGain();gain.gain.value=.04;amb.connect(f);f.connect(gain);gain.connect(a.destination);amb.start();log('Фон включён.')};document.getElementById('next').onclick=()=>{i=(i+1)%states.length;const s=states[i];document.body.className=s[0];M.textContent=s[1];B.innerHTML='<small>Северин</small>'+s[2]};document.getElementById('quiet').onclick=()=>{if(gain)gain.gain.value=0;log('Тише.')};log('MediaDevices: '+(navigator.mediaDevices?'есть':'нет'));</script></body></html>
