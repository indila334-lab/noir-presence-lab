<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Маска Аудио · Северин</title>
  <style>
    html,body{margin:0;min-height:100%;background:#071521;color:#eef7ff;font-family:Arial,system-ui,sans-serif}
    body{display:grid;place-items:center;padding:22px}
    .box{width:min(980px,100%);background:#10273a;border:1px solid #2f607e;border-radius:26px;padding:26px;box-shadow:0 30px 100px #0008}
    .top{font-size:18px;color:#9cc6de;margin:0 0 12px;text-align:center}
    h1{font-size:clamp(42px,8vw,96px);line-height:.95;margin:0 0 16px}
    p{font-size:clamp(18px,3vw,30px);line-height:1.35;color:#d9efff}
    textarea{width:100%;min-height:120px;border-radius:18px;border:1px solid #4f86a8;background:#071521;color:#fff;font-size:24px;padding:16px;box-sizing:border-box}
    button{width:100%;margin:10px 0;padding:22px 18px;border:0;border-radius:20px;background:#1cc7f5;color:#fff;font-size:clamp(24px,4vw,44px);font-weight:800}
    button.small{background:#244b68;font-size:clamp(18px,3vw,28px)}
    audio{width:100%;margin:16px 0;background:#fff;border-radius:30px}
    pre{white-space:pre-wrap;min-height:150px;max-height:260px;overflow:auto;background:#071521;color:#ffd36b;border:1px solid #2f607e;border-radius:16px;padding:16px;font-size:22px}
  </style>
</head>
<body>
  <main class="box">
    <p class="top">Маска Аудио · id: audio-file-005</p>
    <h1>Северин</h1>
    <p>Марина, тест показал главное: WebAudio и WAV играют на ТВ. Браузерный TTS не нужен и не используется. MP3 не играет, пока в репозитории нет файла <b>docs/audio/dino.mp3</b>.</p>

    <textarea id="text">Марина, проверка голоса. Телевизор не говорит сам. Телевизор проигрывает готовый файл.</textarea>

    <button id="unlock">1 · Разбудить звук — теперь с коротким пиком</button>
    <button id="dino">2 · Динозавр WebAudio</button>
    <button id="wav">3 · Сгенерированный WAV-файл</button>
    <button id="mp3">4 · Проверить docs/audio/dino.mp3</button>
    <button id="all" class="small">Проверить звук по очереди</button>

    <audio id="player" controls preload="auto"></audio>
    <pre id="log">Страница загружена. Сначала нажми «Разбудить звук».</pre>
  </main>

  <script>
    const logEl=document.getElementById('log');
    const player=document.getElementById('player');
    let ctx=null;
    let unlocked=false;

    function log(msg,kind=''){
      const t=new Date().toLocaleTimeString('ru-RU');
      const mark=kind==='ok'?'✅ ':kind==='bad'?'⚠️ ':'';
      logEl.textContent='['+t+'] '+mark+msg+'\n'+logEl.textContent;
    }

    function getCtx(){
      const C=window.AudioContext||window.webkitAudioContext;
      if(!C)return null;
      if(!ctx)ctx=new C();
      return ctx;
    }

    async function unlockAudio(){
      const c=getCtx();
      if(c&&c.state==='suspended')await c.resume();
      try{
        player.muted=false;
        player.src=makeWavUrl('unlock');
        player.currentTime=0;
        await player.play();
      }catch(e){log('Короткий пик не сыграл: '+e.message,'bad')}
      unlocked=true;
      log('Звук разбужен. Если был короткий пик — кнопка работает.','ok');
    }

    function playDino(){
      const c=getCtx();
      if(!c){log('AudioContext недоступен. Тогда оставляем только готовый аудиофайл.','bad');return}
      const now=c.currentTime;
      const master=c.createGain();
      master.gain.setValueAtTime(0.0001,now);
      master.gain.exponentialRampToValueAtTime(0.35,now+0.04);
      master.gain.exponentialRampToValueAtTime(0.0001,now+1.2);
      master.connect(c.destination);
      [62,78,93].forEach((f,i)=>{
        const o=c.createOscillator();
        const g=c.createGain();
        o.type=i===0?'sawtooth':'square';
        o.frequency.setValueAtTime(f,now);
        o.frequency.exponentialRampToValueAtTime(f*0.52,now+1.1);
        g.gain.value=i===0?0.8:0.2;
        o.connect(g);g.connect(master);o.start(now+i*0.035);o.stop(now+1.22);
      });
      log('Динозавр WebAudio запущен. Твой отчёт: звук был, как будто что-то шмякнулось. Это успех.','ok');
    }

    function makeWavUrl(mode='voice'){
      const sampleRate=22050;
      const seconds=mode==='unlock'?0.22:2.15;
      const length=Math.floor(sampleRate*seconds);
      const data=new Int16Array(length);
      for(let i=0;i<length;i++){
        const t=i/sampleRate;
        const env=Math.min(1,t*10)*Math.min(1,(seconds-t)*8);
        const base=mode==='unlock'?880:120;
        const wobble=Math.sin(2*Math.PI*3*t)*18;
        const s=Math.sin(2*Math.PI*(base+wobble)*t)+0.35*Math.sin(2*Math.PI*(base*1.5)*t);
        data[i]=Math.max(-1,Math.min(1,s*env*0.45))*32767;
      }
      const b=new ArrayBuffer(44+data.length*2);
      const v=new DataView(b);
      function str(off,s){for(let i=0;i<s.length;i++)v.setUint8(off+i,s.charCodeAt(i))}
      str(0,'RIFF');v.setUint32(4,36+data.length*2,true);str(8,'WAVE');str(12,'fmt ');
      v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sampleRate,true);
      v.setUint32(28,sampleRate*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);str(36,'data');v.setUint32(40,data.length*2,true);
      let off=44;for(let i=0;i<data.length;i++,off+=2)v.setInt16(off,data[i],true);
      return URL.createObjectURL(new Blob([b],{type:'audio/wav'}));
    }

    async function playGeneratedWav(){
      player.src=makeWavUrl('voice');
      player.currentTime=0;
      await player.play();
      log('Сгенерированный WAV играет. Твой отчёт: космическое из 80-х. Значит готовые файлы работают.','ok');
    }

    async function playMp3(){
      player.src='./audio/dino.mp3?cache='+Date.now();
      player.currentTime=0;
      try{await player.play();log('docs/audio/dino.mp3 найден и запущен.','ok')}
      catch(e){log('MP3 не сыграл, потому что файла docs/audio/dino.mp3 ещё нет или браузер не смог его открыть. Это ожидаемо на этом шаге.','bad')}
    }

    async function checkAll(){
      await unlockAudio();
      setTimeout(()=>playDino(),700);
      setTimeout(()=>playGeneratedWav().catch(e=>log('WAV не сыграл: '+e.message,'bad')),2300);
      setTimeout(()=>playMp3(),5200);
    }

    document.getElementById('unlock').onclick=()=>unlockAudio();
    document.getElementById('dino').onclick=()=>{if(!unlocked)log('Лучше сначала нажать «Разбудить звук».','bad');playDino()};
    document.getElementById('wav').onclick=()=>playGeneratedWav().catch(e=>log('WAV ошибка: '+e.message,'bad'));
    document.getElementById('mp3').onclick=()=>playMp3();
    document.getElementById('all').onclick=()=>checkAll();

    log('TTS отключён: на ТВ-приставке его нет. Работаем через готовые аудиофайлы.','ok');
    log('MP3 пока ожидаемо не играет, пока не добавлен docs/audio/dino.mp3.');
    log('AudioContext: '+(getCtx()?'есть':'нет'));
  </script>
</body>
</html>
