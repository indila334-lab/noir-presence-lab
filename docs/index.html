<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Маска Аудио · Северин</title><style>body{margin:0;background:#071521;color:#eef7ff;font-family:Arial,sans-serif;padding:24px}main{max-width:980px;margin:auto;background:#10273a;border:1px solid #2f607e;border-radius:26px;padding:26px}h1{font-size:64px;margin:0 0 12px}p{font-size:26px}button,a{display:block;box-sizing:border-box;width:100%;margin:10px 0;padding:22px;border:0;border-radius:20px;background:#1cc7f5;color:white;font-size:34px;font-weight:800;text-align:center;text-decoration:none}.dark{background:#244b68}.warn{background:#835b17}audio{width:100%;margin:16px 0}pre{white-space:pre-wrap;background:#071521;color:#ffd36b;border:1px solid #2f607e;border-radius:16px;padding:16px;font-size:22px;max-height:320px;overflow:auto}</style></head><body><main><p>Маска Аудио · id: no-api-009</p><h1>Северин</h1><p>Без API: звук наружу, микрофон внутрь, запись локально. Кнопка 6 теперь умеет читать текстовый audio payload из docs/audio/dino.mp3 и проигрывать его как WAV.</p><button id="unlock">1 · Разбудить звук</button><button id="wav">2 · Проверить мой голос-файл</button><button id="rec">3 · Записать тебя 5 секунд</button><button id="playLast">4 · Проиграть последнюю запись</button><a id="download" class="dark" href="#">5 · Скачать последнюю запись</a><button id="mp3" class="warn">6 · Проверить docs/audio/dino.mp3</button><audio id="player" controls></audio><pre id="log">Готово.</pre></main><script>const L=document.getElementById('log'),P=document.getElementById('player'),D=document.getElementById('download');let C=null,U=null,B=null;function log(x,k=''){L.textContent='['+new Date().toLocaleTimeString('ru-RU')+'] '+(k?'✅ ':'')+x+'\n'+L.textContent}function ac(){const A=AudioContext||webkitAudioContext;if(!C)C=new A();return C}function makeWav(beep){const sr=22050,sec=beep?.22:2.1,n=sr*sec|0,d=new Int16Array(n);for(let i=0;i<n;i++){const t=i/sr,e=Math.min(1,t*10)*Math.min(1,(sec-t)*6),f=beep?880:130,s=Math.sin(6.283*f*t)+.35*Math.sin(6.283*f*1.5*t);d[i]=Math.max(-1,Math.min(1,s*e*.45))*32767}const b=new ArrayBuffer(44+n*2),v=new DataView(b);function S(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}S(0,'RIFF');v.setUint32(4,36+n*2,true);S(8,'WAVE');S(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);S(36,'data');v.setUint32(40,n*2,true);let o=44;for(let i=0;i<n;i++,o+=2)v.setInt16(o,d[i],true);return URL.createObjectURL(new Blob([b],{type:'audio/wav'}))}async function play(src,msg){P.src=src;P.currentTime=0;await P.play();log(msg,1)}async function rec(){try{const s=await navigator.mediaDevices.getUserMedia({audio:true}),a=[];const r=new MediaRecorder(s);r.ondataavailable=e=>{if(e.data.size)a.push(e.data)};r.onstop=()=>{s.getTracks().forEach(t=>t.stop());B=new Blob(a,{type:r.mimeType||'audio/webm'});if(U)URL.revokeObjectURL(U);U=URL.createObjectURL(B);P.src=U;D.href=U;D.download='marina-voice.webm';log('Запись готова. Уши живые.',1);P.play().catch(()=>{})};r.start();log('Говори 5 секунд.');setTimeout(()=>r.stop(),5000)}catch(e){log('Микрофон ошибка: '+e.message)}}function b64blob(t){const clean=t.trim();const bin=atob(clean);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:clean.startsWith('UklG')?'audio/wav':'audio/mpeg'})}async function mp3(){try{const r=await fetch('./audio/dino.mp3?c='+Date.now());if(!r.ok)throw Error('HTTP '+r.status);const t=await r.text();const url=URL.createObjectURL(b64blob(t));await play(url,'docs/audio/dino.mp3 раскодирован и играет. Да, это костыль, но живой.')}catch(e){log('MP3/payload не сыграл: '+e.message)}}document.getElementById('unlock').onclick=()=>{ac().resume?.();play(makeWav(1),'Звук разбужен')};document.getElementById('wav').onclick=()=>play(makeWav(0),'Готовый WAV играет');document.getElementById('rec').onclick=rec;document.getElementById('playLast').onclick=()=>U?play(U,'Последняя запись играет'):log('Записи нет');D.onclick=e=>{if(!B){e.preventDefault();log('Скачивать нечего')}};document.getElementById('mp3').onclick=mp3;log('MediaDevices: '+(navigator.mediaDevices?'есть':'нет'));log('AudioContext: есть');</script></body></html>
