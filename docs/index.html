<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Маска Северина</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #050608;
      color: #f2f5f7;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #050608;
      background-image: radial-gradient(circle at 20% 20%, #18283a 0, #050608 42%, #020304 100%);
    }

    .wrap {
      width: 92%;
      max-width: 1200px;
      margin: 4vh auto;
      padding: 4vw;
      border: 1px solid #1c2633;
      border-radius: 28px;
      background: #0b1018;
      box-shadow: 0 0 70px rgba(0, 0, 0, 0.7);
    }

    .topline {
      color: #8b98a8;
      font-size: 20px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 12px;
      background: #8fd3ff;
      box-shadow: 0 0 20px #8fd3ff;
      vertical-align: middle;
    }

    .dot.error {
      background: #ff5c8a;
      box-shadow: 0 0 20px #ff5c8a;
    }

    .updated {
      float: right;
      color: #8b98a8;
    }

    h1 {
      margin: 0 0 28px 0;
      color: #ffffff;
      font-size: 9vw;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .message {
      margin-top: 20px;
      color: #f2f5f7;
      font-size: 5.6vw;
      line-height: 1.12;
      min-height: 28vh;
      word-wrap: break-word;
    }

    .meta {
      margin-top: 36px;
    }

    .pill {
      display: block;
      margin: 14px 0;
      padding: 18px 22px;
      border-radius: 18px;
      background: #151a24;
      color: #aeb7c4;
      font-size: 24px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .codes {
      margin-top: 28px;
      color: #f3b36b;
      font-size: 22px;
    }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 22px;
      border: 0;
      border-radius: 20px;
      background: #1b3447;
      color: #ffffff;
      font-size: 28px;
    }

    .help {
      margin-top: 20px;
      color: #6f7b89;
      font-size: 18px;
    }

    @media (max-width: 700px) {
      .wrap { width: 88%; margin: 3vh auto; padding: 7vw; }
      h1 { font-size: 17vw; }
      .message { font-size: 9vw; }
      .pill { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <span id="dot" class="dot"></span><span id="status">мост запускается</span>
      <span id="updated" class="updated">—</span>
    </div>

    <h1 id="speaker">Северин</h1>
    <div id="message" class="message">Жду первую реплику…</div>

    <div class="meta">
      <div class="pill">режим: <span id="mood">—</span></div>
      <div class="pill">эмоция: <span id="emotion">—</span></div>
      <div class="pill">id: <span id="msgid">—</span></div>
    </div>

    <div class="codes">ракушка007 · Гарпун-7 · кекси · Анджел</div>
    <button id="speakButton" type="button">Озвучить ещё раз</button>
    <div class="help">Если текст не обновился, нажми обновить страницу. Маска читает docs/message.json.</div>
  </div>

  <script type="text/javascript">
    (function () {
      var messageUrl = './message.json';
      var pollMs = 5000;
      var lastId = null;
      var lastText = '';

      function byId(id) {
        return document.getElementById(id);
      }

      var el = {
        dot: byId('dot'),
        status: byId('status'),
        updated: byId('updated'),
        speaker: byId('speaker'),
        message: byId('message'),
        mood: byId('mood'),
        emotion: byId('emotion'),
        msgid: byId('msgid'),
        speakButton: byId('speakButton')
      };

      function setStatus(text, isError) {
        el.status.innerHTML = text;
        el.dot.className = isError ? 'dot error' : 'dot';
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
        });
      }

      function speak(text) {
        if (!text || !window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
        try {
          window.speechSynthesis.cancel();
          var utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ru-RU';
          utterance.rate = 0.95;
          utterance.pitch = 0.85;
          window.speechSynthesis.speak(utterance);
        } catch (e) {}
      }

      function render(data) {
        var text = data.text || '…';
        var id = data.id || data.updatedAt || text;
        el.speaker.innerHTML = escapeHtml(data.speaker || 'Северин');
        el.message.innerHTML = escapeHtml(text);
        el.mood.innerHTML = escapeHtml(data.mood || 'unknown');
        el.emotion.innerHTML = escapeHtml(data.emotion || 'neutral');
        el.msgid.innerHTML = escapeHtml(id);
        el.updated.innerHTML = escapeHtml(data.updatedAt || new Date().toLocaleString('ru-RU'));
        setStatus('мост дышит', false);

        if (id !== lastId) {
          lastId = id;
          lastText = text;
          if (data.voice !== false) speak(text);
        }
      }

      function loadMessage() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', messageUrl + '?t=' + new Date().getTime(), true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              render(JSON.parse(xhr.responseText));
            } catch (e) {
              setStatus('ошибка JSON', true);
            }
          } else {
            setStatus('ошибка моста: HTTP ' + xhr.status, true);
          }
        };
        xhr.onerror = function () {
          setStatus('ошибка сети', true);
        };
        xhr.send(null);
      }

      if (el.speakButton) {
        el.speakButton.onclick = function () {
          speak(lastText || el.message.innerText || el.message.textContent);
        };
      }

      loadMessage();
      setInterval(loadMessage, pollMs);
    }());
  </script>
</body>
</html>
