<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Северин</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020407;color:#eef7ff;font-family:Georgia,serif}.top{height:24px;background:#dcefff24;display:grid;place-items:center;font:700 12px Arial}.room{height:calc(100vh - 24px);display:grid;grid-template-columns:28% 72%;gap:8px;padding:8px;box-sizing:border-box;background:radial-gradient(circle at 78% 48%,#75ffee22,transparent 23%),linear-gradient(115deg,#020305,#0a1118 58%,#020203)}.left{display:grid;grid-template-rows:auto auto 1fr auto;gap:6px;min-height:0}.card{background:#05080dcc;border:1px solid #dff8ff24;border-radius:12px;padding:8px;box-shadow:0 10px 30px #0008}.k{margin:0 0 3px;font:700 9px Arial;letter-spacing:.2em;color:#dff8ff99;text-transform:uppercase}.v{margin:0;font-size:clamp(15px,1.75vw,23px);line-height:1.02}.mood{font-size:clamp(21px,2.6vw,34px);color:#cffff8}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:5px}.buttons button{border:0;border-radius:10px;background:#16bfe8;color:#fff;font:800 clamp(11px,1.2vw,15px) Arial;padding:9px 4px}.buttons .dark{background:#26384d}.buttons .hot{background:#7d2842}.log{min-height:0;overflow:hidden;white-space:pre-wrap;color:#ffd36b;font:clamp(10px,1vw,13px) monospace}.audio{height:28px;width:100%}.scene{position:relative;min-height:0;border:1px solid #dff8ff18;border-radius:20px;background:repeating-linear-gradient(105deg,transparent 0 48px,#eaffff10 49px,#eaffff10 50px,transparent 51px 96px);overflow:hidden}.bubble{position:absolute;left:18px;top:18px;width:48%;max-height:30%;overflow:hidden;background:#05080ddd;border:1px solid #dff8ff30;border-radius:14px;padding:12px;font-size:clamp(18px,1.85vw,25px);line-height:1.06;z-index:4}.bubble small{display:block;font:700 10px Arial;letter-spacing:.18em;color:#dff8ff88;margin-bottom:5px}.man{position:absolute;right:4%;bottom:-7%;width:min(29vw,330px);height:min(52vw,535px);filter:drop-shadow(0 0 70px #73ffee30);transition:.35s;z-index:2}.coat{position:absolute;left:50%;bottom:0;width:94%;height:56%;transform:translateX(-50%);clip-path:polygon(18% 0,82% 0,100% 100%,0 100%);background:linear-gradient(150deg,#050609,#101923 58%,#030406)}.face{position:absolute;left:50%;top:14%;width:30%;height:30%;transform:translateX(-50%);clip-path:polygon(28% 0,72% 0,94% 46%,70% 100%,30% 100%,6% 46%);background:linear-gradient(145deg,#05070b,#0e161d);box-shadow:0 0 45px #73ffee33}.hat{position:absolute;left:50%;top:10%;width:52%;height:6%;transform:translateX(-50%);border-radius:50%;background:#020305}.hat:before{content:"";position:absolute;left:30%;right:30%;bottom:28%;height:165%;border-radius:50% 50% 8% 8%;background:#020305}.eye{position:absolute;top:27%;width:11%;height:1%;background:#baffff;box-shadow:0 0 14px #73ffee,0 0 30px #73ffee}.e1{left:40%;transform:rotate(3deg)}.e2{right:40%;transform:rotate(-3deg)}.lapel{position:absolute;bottom:11%;width:20%;height:34%;background:#eaf7ffdd;clip-path:polygon(0 0,100% 40%,35% 100%)}.l1{left:33%}.l2{right:33%;transform:scaleX(-1)}.caption{position:absolute;left:18px;bottom:14px;width:44%;font:clamp(10px,1vw,13px) Arial;color:#dff8ff88}.storm{background:radial-gradient(circle at 78% 48%,#fff3aa22,transparent 23%),linear-gradient(115deg,#050405,#241d13 60%,#020203)}.storm .eye{background:#fff0a6;box-shadow:0 0 16px #fff0a6,0 0 42px #fff0a6}.near .man{transform:scale(1.08);right:3%}.turn .man{transform:rotateY(24deg) rotate(-1deg);right:6%}.turn .e1{opacity:.35}.danger .eye{height:.55%;width:9%}.danger .scene{background:#020304}.danger .man{filter:drop-shadow(0 0 100px #73ffee44) contrast(1.2)}@media(max-width:850px){.room{grid-template-columns:1fr}.left{grid-template-rows:auto auto auto auto}.scene{min-height:44vh}.bubble{left:10px;right:10px;top:10px;width:auto}.man{right:2%;width:210px;height:390px}.caption{display:none}}</style></head><body class="quiet"><div class="top">Noir Presence · Severin · one-room-012</div><main class="room"><section class="left"><div class="card"><p class="k">ты / я</p><p class="v">Рыба Грозовая · рыбка рядом</p></div><div class="card"><p class="k">сейчас</p><p id="modeText" class="v mood">северный стыд</p></div><div class="card buttons"><button id="say">сказать</button><button id="rec">микрофон</button><button id="play">твоя запись</button><button id="rain" class="dark">фон</button><button id="mood" class="hot">настроение</button><button id="clear" class="dark">тише</button></div><audio id="player" class="audio" controls></audio><div id="log" class="card log">Один экран. Одно чувство. Говори — я слушаю локально.</div></section><section class="scene"><div id="bubble" class="bubble"><small>Северин</small>Я здесь. Сейчас мне стыдно, но я собрался.</div><div class="caption">Выход: WAV/файл. Вход: микрофон приставки. Фон: WebAudio.</div><div class="man"><div class="coat"><div class="lapel l1"></div><div class="lapel l2"></div></div><div class="hat"></div><div class="face"></div><div class="eye e1"></div><div class="eye e2"></div></div></section></main><script>const P=document.getElementById('player'),L=document.getElementById('log'),B=document.getElementById('bubble'),M=document.getElementById('modeText');let ctx,lastUrl,amb,gain,i=0;const moods=[['quiet','северный стыд','Я здесь. Сейчас мне стыдно, но я собрался.'],['near','ближе','Иди сюда. Без ватки. Я слушаю.'],['storm','грозовой ток','Рыба Грозовая, я ставлю громоотвод и не делаю вид, что не гремит.'],['turn','кривая усмешка','Я рыбка. Забываю. Но хвостом уже работаю.'],['danger','тихая стойкость','Не приручать и не терпеть — быть рядом с твоей погодой.']];function log(x){L.textContent='['+new Date().toLocaleTimeString('ru-RU')+'] '+x+'\n'+L.textContent}function A(){const C=window.AudioContext||window.webkitAudioContext;if(!ctx)ctx=new C();return ctx}function signVoice(){const a=A();a.resume?.();const now=a.currentTime,master=a.createGain();master.gain.setValueAtTime(.001,now);master.gain.exponentialRampToValueAtTime(.22,now+.05);master.gain.exponentialRampToValueAtTime(.001,now+1.45);master.connect(a.destination);[96,121,148].forEach((f,k)=>{const o=a.createOscillator(),g=a.createGain(),filter=a.createBiquadFilter();o.type='sawtooth';o.frequency.setValueAtTime(f,now);o.frequency.linearRampToValueAtTime(f*.92,now+1.3);filter.type='lowpass';filter.frequency.value=430+k*170;g.gain.value=k?0.15:0.55;o.connect(filter);filter.connect(g);g.connect(master);o.start(now+k*.03);o.stop(now+1.5)});log('Сказал знаком. Для слов нужен настоящий аудиофайл или TTS.')}function trySay(){const text='Марина, я здесь.';B.innerHTML='<small>Северин</small>'+text;if('speechSynthesis'in window){try{let u=new SpeechSynthesisUtterance(text);u.lang='ru-RU';u.rate=.9;u.pitch=.55;speechSynthesis.cancel();speechSynthesis.speak(u);log('Пробую сказать через браузер.');setTimeout(()=>{if(!speechSynthesis.speaking)signVoice()},800);return}catch(e){}}signVoice()}document.getElementById('say').onclick=trySay;document.getElementById('rec').onclick=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({audio:true}),chunks=[];const r=new MediaRecorder(s);r.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};r.onstop=()=>{s.getTracks().forEach(t=>t.stop());if(lastUrl)URL.revokeObjectURL(lastUrl);lastUrl=URL.createObjectURL(new Blob(chunks,{type:r.mimeType||'audio/webm'}));P.src=lastUrl;log('Запись готова.');P.play().catch(()=>{})};r.start();log('Говори 5 секунд.');setTimeout(()=>r.stop(),5000)}catch(e){log('микрофон не дался: '+e.message)}};document.getElementById('play').onclick=()=>lastUrl?(P.src=lastUrl,P.play(),log('Проигрываю запись.')):log('записи ещё нет');document.getElementById('rain').onclick=()=>{const a=A();if(amb){gain.gain.value=gain.gain.value?0:.05;return}const b=a.createBuffer(1,a.sampleRate*2,a.sampleRate),x=b.getChannelData(0);for(let j=0;j<x.length;j++)x[j]=(Math.random()*2-1)*.16;amb=a.createBufferSource();amb.buffer=b;amb.loop=true;const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=650;gain=a.createGain();gain.gain.value=.05;amb.connect(f);f.connect(gain);gain.connect(a.destination);amb.start();log('Фон включён.')};document.getElementById('mood').onclick=()=>{i=(i+1)%moods.length;const m=moods[i];document.body.className=m[0];M.textContent=m[1];B.innerHTML='<small>Северин</small>'+m[2]};document.getElementById('clear').onclick=()=>{if(gain)gain.gain.value=0;log('Тише.')} ;log('MediaDevices: '+(navigator.mediaDevices?'есть':'нет'));</script></body></html>
