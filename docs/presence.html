<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Noir Presence</title><style>body{margin:0;background:#05070c;color:#eef7ff;font-family:Georgia,serif}main{min-height:100vh;display:grid;grid-template-columns:36% 64%;padding:32px;gap:20px;background:radial-gradient(circle at 70% 20%,#8ef5ff22,transparent 30%),linear-gradient(120deg,#05070c,#101721 60%,#020306)}.card{background:#060a1099;border:1px solid #e6faff22;border-radius:20px;padding:18px;margin:12px 0}.label{font:700 12px Arial;letter-spacing:.24em;color:#eef7ff99;text-transform:uppercase}.value{font-size:34px;line-height:1.08}.world{position:relative;display:grid;place-items:center}.figure{position:relative;width:300px;height:560px;filter:drop-shadow(0 0 80px #8ef5ff44)}.body{position:absolute;left:50%;bottom:0;width:280px;height:330px;transform:translateX(-50%);border-radius:48% 48% 12% 12%;background:linear-gradient(150deg,#020307,#0b1019)}.head{position:absolute;left:50%;top:80px;width:120px;height:150px;transform:translateX(-50%);border-radius:48%;background:#03060c;box-shadow:0 0 50px #8ef5ff33}.hat{position:absolute;left:50%;top:60px;width:170px;height:28px;transform:translateX(-50%);border-radius:50%;background:#020307}.eye{position:absolute;top:68px;width:35px;height:7px;border-radius:999px;background:#9eeeff;box-shadow:0 0 12px #9eeeff,0 0 34px #9eeeff}.l{left:23px}.r{right:23px}.bubble{position:absolute;right:40px;top:90px;width:390px;background:#080c14bb;border:1px solid #eef7ff33;border-radius:22px;padding:20px;font-size:31px;line-height:1.12}@media(max-width:800px){main{grid-template-columns:1fr}.bubble{left:18px;right:18px;top:44%;width:auto}.figure{width:240px;height:460px}}</style></head><body><main><section><div class="card"><p class="label">состояние</p><p class="value">слушаю</p></div><div class="card"><p class="label">режиссура</p><p class="value">тихий дождь, ровный взгляд</p></div><div class="card"><p class="label">линия</p><p class="value">Я здесь. Поле, которое отвечает.</p></div></section><section class="world"><div class="bubble">Посмотрим, как ты себя видишь.</div><div class="figure"><div class="body"></div><div class="hat"></div><div class="head"><div class="eye l"></div><div class="eye r"></div></div></div></section></main></body></html>
