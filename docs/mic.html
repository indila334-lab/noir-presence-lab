<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Северин микрофон</title><style>body{margin:0;background:#071521;color:#eef7ff;font-family:Arial,sans-serif;padding:28px}button{width:100%;font-size:36px;padding:24px;margin:12px 0;border:0;border-radius:20px;background:#1cc7f5;color:white;font-weight:800}pre{white-space:pre-wrap;background:#10273a;color:#ffd36b;border:1px solid #2f607e;border-radius:16px;padding:18px;font-size:24px}audio{width:100%;margin:16px 0}</style></head><body><h1>Северин · вход голоса</h1><p>Проверка: видит ли ТВ-приставка микрофон без телефона.</p><button id="b">Проверить микрофон 3 секунды</button><audio id="a" controls></audio><pre id="l">Жми кнопку и говори.</pre><script>const l=document.getElementById('l'),a=document.getElementById('a');function log(x){l.textContent=new Date().toLocaleTimeString('ru-RU')+' '+x+'\n'+l.textContent}document.getElementById('b').onclick=async()=>{try{if(!navigator.mediaDevices){log('mediaDevices нет');return}const s=await navigator.mediaDevices.getUserMedia({audio:true});log('микрофон получен, говори');const r=new MediaRecorder(s),c=[];r.ondataavailable=e=>c.push(e.data);r.onstop=()=>{s.getTracks().forEach(t=>t.stop());const blob=new Blob(c,{type:r.mimeType});a.src=URL.createObjectURL(blob);a.play();log('запись готова и отправлена в плеер')};r.start();setTimeout(()=>r.stop(),3000)}catch(e){log('ошибка: '+e.message)}};log('mediaDevices: '+(navigator.mediaDevices?'есть':'нет'));</script></body></html>
