<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Severin Voice Lab</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">SEVERIN / VOICE BRIDGE</p>
      <h1>Голосовой мост для ТВ-приставки</h1>
      <p class="lead">Страница теперь умеет сама ждать новые ответы из latest.json. На ТВ сначала нажми “Разбудить звук”, потом “Автоозвучка”. Да, техника всё ещё любит делать вид, что она древний обряд.</p>
      <label class="field">
        <span>Фраза</span>
        <textarea id="voiceText" rows="4">Марина, мост голоса поднят. Если браузер опять строит из себя кирпич, динозавр скажет за него.</textarea>
      </label>
      <div class="buttons">
        <button id="unlockBtn" type="button">1. Разбудить звук</button>
        <button id="autoBtn" type="button">2. Автоозвучка</button>
        <button id="speakBtn" type="button">Сказать</button>
        <button id="mp3Btn" type="button">MP3</button>
        <button id="dinoBtn" type="button">Динозавр</button>
      </div>
      <audio id="fallbackAudio" preload="auto" src="./audio/dino.mp3"></audio>
      <pre id="log" aria-live="polite">Готов. На ТВ сначала нажми “Разбудить звук”.</pre>
    </section>
  </main>
  <script src="./voice.js"></script>
</body>
</html>
